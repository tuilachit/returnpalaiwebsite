<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ReturnPal AI - Never Forget a Return Deadline Again</title>
    <meta name="description" content="A simple app built in Sydney to help you track return deadlines and never lose money on forgotten purchases. Join our beta and be among the first to try it." />
    <meta name="keywords" content="return management, receipt scanning, return deadlines, shopping app, Sydney startup, beta app, return tracking" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://returnpalai.com.au/" />
    <meta property="og:title" content="ReturnPal AI - Never Forget a Return Deadline Again" />
    <meta property="og:description" content="A simple app to track return deadlines and never lose money on forgotten purchases. Join our beta - built by a small team in Sydney." />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://returnpalai.com.au/" />
    <meta property="twitter:title" content="ReturnPal AI - Never Forget a Return Deadline Again" />
    <meta property="twitter:description" content="A simple app to track return deadlines and never lose money on forgotten purchases. Join our beta - built by a small team in Sydney." />
    
    <!-- Favicon -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    
    <!-- Preconnect to external domains -->
    <link rel="preconnect" href="https://images.pexels.com" />
    
    <!-- Font preloading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=SF+Pro+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    
    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "ReturnPal AI",
      "description": "Simple return deadline tracking app built in Sydney",
      "applicationCategory": "Lifestyle",
      "operatingSystem": "iOS, Android",
      "creator": {
        "@type": "Organization",
        "name": "ReturnPal AI",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "Sydney",
          "addressLocality": "Sydney",
          "addressRegion": "NSW",
          "addressCountry": "AU"
        }
      },
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "AUD"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "ratingCount": "200"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
